name: Seite veröffentlichen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Schlüssel aus den verschlüsselten GitHub-Secrets einsetzen.
      # Fehlt ein Secret, bleibt der Wert leer und die Seite nutzt ihre
      # eingebauten Ersatzwerte (geschätzte Entfernungen bzw. Übungsmodus).
      - name: API-Schlüssel einsetzen
        run: |
          sed -i 's|orsApiKey: ""|orsApiKey: "${{ secrets.ORS_API_KEY }}"|' app.js
          sed -i 's|supabaseUrl: ""|supabaseUrl: "${{ secrets.SUPABASE_URL }}"|' app.js
          sed -i 's|supabaseAnonKey: ""|supabaseAnonKey: "${{ secrets.SUPABASE_ANON_KEY }}"|' app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
