name: Seite veröffentlichen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # OpenRouteService-Key aus dem verschlüsselten GitHub-Secret einsetzen.
      # Fehlt das Secret, bleibt der Wert leer und Entfernungen werden
      # über die Luftlinie geschätzt.
      #
      # Die Supabase-Werte stehen bewusst direkt in app.js: Der
      # "publishable key" ist von Supabase dafür vorgesehen, öffentlich in
      # einer Website zu stehen, und wäre in der ausgelieferten Datei
      # ohnehin sichtbar. Er erlaubt nur das Anlegen von Anfragen.
      - name: API-Schlüssel einsetzen
        run: |
          sed -i 's|orsApiKey: ""|orsApiKey: "${{ secrets.ORS_API_KEY }}"|' app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
